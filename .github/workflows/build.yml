name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-windows:
    name: Windows VST3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: KeyboardAir-Windows-VST3
          path: build/KeyboardAirReverb_artefacts/Release/VST3/

  build-mac:
    name: macOS AU + VST3
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: KeyboardAir-Mac-VST3
          path: build/KeyboardAirReverb_artefacts/Release/VST3/

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: KeyboardAir-Mac-AU
          path: build/KeyboardAirReverb_artefacts/Release/AU/
